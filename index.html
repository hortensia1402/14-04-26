<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felices 2 meses ❤️</title>
<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#d6f1ff;
  color:white;
}
.pantalla{
  position:fixed;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:opacity .7s ease;
}
.contenido{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:95%;
  max-width:500px;
}
.oculto{opacity:0;pointer-events:none}
img{width:95%;max-width:350px;margin-bottom:15px}
.botones{display:flex;gap:20px;margin-top:10px}
button{width:130px;padding:12px;border:none;background:#ff6b81;color:white;border-radius:12px;font-size:16px;transition:transform .2s}
.corazon{
  position:fixed;
  font-size:26px;
  color:pink;
  animation:flotar 6s linear forwards;
  opacity:.85;
}
@keyframes flotar{
  0%{transform:translateY(0) scale(1);opacity:.9}
  100%{transform:translateY(-120vh) scale(1.6);opacity:0}
}
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,.2);
}
</style></head>
<body>
<!-- INTRO -->
<div class="pantalla" id="intro">
 <div class="contenido">
   <div class="card">
     <img src="https://media.tenor.com/ftqs42Yna-oAAAAj/mochi-mochi-hello-white-mochi-mochi.gif">
   </div>
   <button onclick="p1()">👋</button>
 </div>
</div>
<!-- 1 -->
<div class="pantalla oculto" id="p1">
 <div class="contenido">
  <img src="https://media.tenor.com/BBS_EGuWfVsAAAAj/peach-shy.gif">
  <h2>¿Me amas?</h2>
  <div class="botones">
    <button id="si1">Sí</button>
    <button onclick="noDesde1()">No</button>
  </div>
 </div>
</div>
<!-- 2 -->
<div class="pantalla oculto" id="p2">
 <div class="contenido">
  <img src="https://media.tenor.com/yr7z512oIf4AAAAj/peach-goma-shy-blush-heart.gif">
  <h2>¿de veldad?</h2>
  <div class="botones">
    <button id="si2">Sí</button>
    <button onclick="noDesde2()">No</button>
  </div>
 </div>
</div>
<!-- 3 -->
<div class="pantalla oculto" id="p3">
 <div class="contenido">
  <img src="https://media.tenor.com/lnI645QIjMAAAAAj/gatitos-enamorados-besos-de-amor.gif">
  <h2>yo también te amo, mi amorr!</h2>
  <button onclick="p4()">Salir</button>
 </div>
</div>
<!-- 4 -->
<div class="pantalla oculto" id="p4">
 <div class="contenido">
  <img src="https://i.pinimg.com/originals/d5/18/8b/d5188b026fc9a41f80472d499ccc38fb.gif">
  <h2>Espera ✋</h2>
   <p>Todavía no te vayas...</p>
  <button onclick="p5()">ok</button>
 </div>
</div>
<!-- 5 -->
<div class="pantalla oculto" id="p5">
 <div class="contenido">
  <img src="https://i.imgur.com/quWVyxf.jpeg">
  <h2>Tenes un correo</h2>
  <button onclick="p6()">Recibir</button>
 </div>
</div>
<!-- 6 -->
<div class="pantalla oculto" id="p6">
 <div class="contenido">
  <img src="https://i.imgur.com/iLFFBoJ.jpeg">
  <button onclick="p7()">A ver</button>
 </div>
</div>
<!-- 7 CARTA -->
<div class="pantalla oculto" id="p7">
 <div class="contenido">
  <img src="https://i.imgur.com/Y7tEZs5.jpeg">
  <button id="btnFinal" class="oculto" onclick="p8()">Continuar</button>
 </div>
</div>
<!-- 8 -->
<div class="pantalla oculto" id="p8">
 <div class="contenido">
  <img src="https://media.tenor.com/_4kl3WUiiQUAAAAj/peach-cat.gif">
  <h2>💕Felices 2 meses💕</h2>
   <p>Te amo muchísimo mi amol*-*</p>
 </div>
</div>
<!-- 9 -->
<div class="pantalla oculto" id="p9">
 <div class="contenido">
  <img src="https://media1.tenor.com/m/cAnqPmcoOLcAAAAd/mochi-mochi-peach-cat-door.gif">
 </div>
</div>
<!-- NO 1 -->
<div class="pantalla oculto" id="no1">
 <div class="contenido">
  <img src="https://media.tenor.com/PLX-tGVl7CQAAAAM/crying-cry.gif">
  <h2>No puede ser😭</h2>
   <p>pq no me amas?😭</p>
  <button onclick="irAP2()">Mentira, io te amo<3 </button>
 </div>
</div>
<!-- NO 2 -->
<div class="pantalla oculto" id="no2">
 <div class="contenido">
  <img src="https://64.media.tumblr.com/ec37de43675e162fe688925093d1b3d1/b63b1aba3169257f-28/s500x750/af87129713aef3eba9825487dcbc271e6aeaa9da.gif">
  <h2>No me mientas Alex</h2>
   <p>No me mientas pq lloro😭</p>
  <button onclick="irAP3()">io te amo de velda<3</button>
 </div>
</div>
<script>
let animacion;function p1(){cambiar("intro","p1"); iniciarCorazones();} function p2(){cambiar("p1","p2");} function p3(){cambiar("p2","p3");} function p4(){cambiar("p3","p4");} function p5(){cambiar("p4","p5");} function p6(){cambiar("p5","p6");} function p7(){cambiar("p6","p7");setTimeout(()=>document.getElementById("btnFinal").classList.remove("oculto"),3000)} function p8(){cambiar("p7","p8");setTimeout(()=>cambiar("p8","p9"),5000)}

function cambiar(a,b){ document.getElementById(a).classList.add("oculto"); document.getElementById(b).classList.remove("oculto"); }

function noDesde1(){cambiar("p1","no1");} function noDesde2(){cambiar("p2","no2");} function irAP2(){cambiar("no1","p2");} function irAP3(){cambiar("no2","p3");}

// corazones flotando desde el inicio function iniciarCorazones(){ if(animacion) return; animacion=setInterval(()=>{ let c=document.createElement("div"); c.className="corazon"; c.textContent="❤"; c.style.left=Math.random()*100+"vw"; c.style.top="100vh"; document.body.appendChild(c); setTimeout(()=>c.remove(),6000); },400); }

// botones "Sí" que se escapan function escapar(btn){ btn.style.transform=translate(${Math.random()*160-80}px,${Math.random()*120-60}px); }

document.getElementById("si1").addEventListener("mouseover",()=>escapar(document.getElementById("si1"))); document.getElementById("si1").addEventListener("click",e=>{e.preventDefault();escapar(e.target);});

document.getElementById("si2").addEventListener("mouseover",()=>escapar(document.getElementById("si2"))); document.getElementById("si2").addEventListener("click",e=>{e.preventDefault();escapar(e.target);}); </script>

</body>
</html>
