<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felices 2 meses ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#d6f1ff;
  color:white;
}
.pantalla{
  position:fixed;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:opacity .7s ease;
}
.contenido{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:95%;
  max-width:500px;
}
.oculto{opacity:0;pointer-events:none}
img{width:95%;max-width:350px;margin-bottom:15px}
.botones{display:flex;gap:20px;margin-top:10px}
button{width:130px;padding:12px;border:none;background:#ff6b81;color:white;border-radius:12px;font-size:16px}
.corazon{position:fixed;font-size:26px;animation:latir 1.5s infinite;color:pink}
@keyframes latir{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* tarjeta intro */
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,.2);
}

/* 💕 corazones flotando (suspendidos) */
.burbuja{
  position:fixed;
  font-size:22px;
  color:#ff7eb9;
  animation:flotar 5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes flotar{
  0%{transform:translateY(0) scale(1);opacity:.8}
  50%{transform:translateY(-12px) scale(1.2);opacity:1}
  100%{transform:translateY(0) scale(1);opacity:.8}
}
  20%{opacity:1}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0}
}

/* botón esquiva */
.escapa{
  position:relative;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="pantalla" id="intro">
 <div class="contenido">
   <div class="card">
     <img src="https://media.tenor.com/ftqs42Yna-oAAAAj/mochi-mochi-hello-white-mochi-mochi.gif">
   </div>
   <button onclick="p1()">👋</button>
 </div>
</div>

<!-- 1 -->
<div class="pantalla oculto" id="p1">
 <div class="contenido">
  <img src="https://media.tenor.com/BBS_EGuWfVsAAAAj/peach-shy.gif">
  <h2>¿Me amas?</h2>
  <div class="botones">
    <button class="escapa" onmouseover="mover(this)">Sí</button>
    <button onclick="noDesde1()">No</button>
  </div>
 </div>
</div>

<!-- 2 -->
<div class="pantalla oculto" id="p2">
 <div class="contenido">
  <img src="https://media.tenor.com/yr7z512oIf4AAAAj/peach-goma-shy-blush-heart.gif">
  <h2>¿de veldad?</h2>
  <div class="botones">
    <button class="escapa" onmouseover="mover(this)">Sí</button>
    <button onclick="noDesde2()">No</button>
  </div>
 </div>
</div>

<!-- 3 -->
<div class="pantalla oculto" id="p3">
 <div class="contenido">
  <img src="https://media.tenor.com/lnI645QIjMAAAAAj/gatitos-enamorados-besos-de-amor.gif">
  <h2>yo también te amo, mi amorr!</h2>
  <button onclick="p4()">Salir</button>
 </div>
</div>

<!-- 4 -->
<div class="pantalla oculto" id="p4">
 <div class="contenido">
  <img src="https://i.pinimg.com/originals/d5/18/8b/d5188b026fc9a41f80472d499ccc38fb.gif">
  <h2>Espera ✋</h2>
   <p>Todavía no te vayas...</p>
  <button onclick="p5()">ok</button>
 </div>
</div>

<!-- 5 -->
<div class="pantalla oculto" id="p5">
 <div class="contenido">
  <img src="https://i.imgur.com/quWVyxf.jpeg">
  <h2>Tenes un correo</h2>
  <button onclick="p6()">Recibir</button>
 </div>
</div>

<!-- 6 -->
<div class="pantalla oculto" id="p6">
 <div class="contenido">
  <img src="https://i.imgur.com/iLFFBoJ.jpeg">
  <button onclick="p7()">A ver</button>
 </div>
</div>

<!-- 7 CARTA -->
<div class="pantalla oculto" id="p7">
 <div class="contenido">
  <img src="https://i.imgur.com/Y7tEZs5.jpeg">
  <button id="btnFinal" class="oculto" onclick="p8()">Continuar</button>
 </div>
</div>

<!-- 8 -->
<div class="pantalla oculto" id="p8">
 <div class="contenido">
  <img src="https://media.tenor.com/_4kl3WUiiQUAAAAj/peach-cat.gif">
  <h2>💕Felices 2 meses💕</h2>
   <p>Te amo muchísimo mi amol*-*</p>
 </div>
</div>

<!-- 9 -->
<div class="pantalla oculto" id="p9">
 <div class="contenido">
  <img src="https://media1.tenor.com/m/cAnqPmcoOLcAAAAd/mochi-mochi-peach-cat-door.gif">
 </div>
</div>

<!-- NO 1 (Bob) -->
<div class="pantalla oculto" id="no1">
 <div class="contenido">
  <img src="https://media.tenor.com/PLX-tGVl7CQAAAAM/crying-cry.gif">
  <h2>No puede ser😭</h2>
   <p>pq no me amas?😭</p>
  <button onclick="irAP2()">Mentira, io te amo<3 </button>
 </div>
</div>

<!-- NO 2 (Bob) -->
<div class="pantalla oculto" id="no2">
 <div class="contenido">
  <img src="https://64.media.tumblr.com/ec37de43675e162fe688925093d1b3d1/b63b1aba3169257f-28/s500x750/af87129713aef3eba9825487dcbc271e6aeaa9da.gif">
  <h2>No me mientas Alex</h2>
   <p>No me mientas pq lloro😭</p>
  <button onclick="irAP3()">io te amo de velda<3</button>
 </div>
</div>

<script>
let animacion;
let burbujasTimer;

/* burbujas intro */
function burbujasIntro(){
 burbujasTimer=setInterval(()=>{
  let b=document.createElement("div");
  b.className="burbuja";
  b.textContent="❤";
  b.style.left=Math.random()*100+"vw";
  b.style.top=Math.random()*100+"vh";
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),5000);
 },400);
},300);
}
/* iniciar corazones inmediatamente */
burbujasIntro();

function p1(){
 cambiar("intro","p1");
 if(burbujasTimer){ clearInterval(burbujasTimer); }
}
function p2(){cambiar("p1","p2");}
function p3(){cambiar("p2","p3");corazones();}
function p4(){cambiar("p3","p4");}
function p5(){cambiar("p4","p5");}
function p6(){cambiar("p5","p6");}
function p7(){cambiar("p6","p7");setTimeout(()=>document.getElementById("btnFinal").classList.remove("oculto"),3000)}
function p8(){cambiar("p7","p8");setTimeout(()=>cambiar("p8","p9"),5000)}

function cambiar(a,b){
 document.getElementById(a).classList.add("oculto");
 document.getElementById(b).classList.remove("oculto");
 clearInterval(animacion);
}

function noDesde1(){cambiar("p1","no1");}
function noDesde2(){cambiar("p2","no2");}
function irAP2(){cambiar("no1","p2");}
function irAP3(){cambiar("no2","p3");}

function corazones(){
 animacion=setInterval(()=>{
  for(let i=0;i<2;i++){
   let c=document.createElement("div");
   c.className="corazon";
   c.textContent="❤";
   c.style.top=Math.random()*100+"vh";
   c.style.left=Math.random()*100+"vw";
   document.body.appendChild(c);
   setTimeout(()=>c.remove(),3000);
  }
 },250);
}

/* mover botón SI */
function mover(btn){
 const x=Math.random()*200-100;
 const y=Math.random()*100-50;
 btn.style.transform=`translate(${x}px,${y}px)`;
}
</script>
</body>
</html>
