<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felices 2 meses ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: black;
  color: white;
}

/* CENTRADO FULL SCREEN */
.pantalla {
  position: fixed;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.contenido {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 90%;
  max-width: 400px;
}

.oculto {
  opacity: 0;
  pointer-events: none;
}

/* IMAGEN RESPONSIVE */
img {
  width: 80%;
  max-width: 280px;
  height: auto;
  margin-bottom: 15px;
}

/* BOTONES */
.botones {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 15px;
  width: 100%;
  height: 80px;
}

button {
  width: 120px;
  padding: 12px;
  border: none;
  background: #ff6b81;
  color: white;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

/* BOTON NO */
#no {
  position: absolute;
}

/* ✨ BRILLOS */
@keyframes brillo {
  0% { opacity: 0; transform: scale(0.3); }
  50% { opacity: 1; transform: scale(1.5); }
  100% { opacity: 0; transform: scale(0.3); }
}

.brillo {
  position: absolute;
  animation: brillo 2s infinite;
}

/* 💖 CORAZONES */
@keyframes latir {
  0% {transform:scale(1);}
  50% {transform:scale(1.4);}
  100% {transform:scale(1);}
}

.corazon {
  position: absolute;
  font-size: 24px;
  animation: latir 1.5s infinite;
}

/* SOBRE */
.sobre {
  position: relative;
  width: 80%;
  max-width: 300px;
}

.sobre-img {
  width: 100%;
}

.papel {
  position: absolute;
  width: 80%;
  left: 10%;
  bottom: -150px;
  opacity: 0;
  transition: all 1s;
}

.papel img {
  width: 100%;
  border-radius: 10px;
}

.abrir .sobre-img {
  opacity: 0;
}

.abrir .papel {
  bottom: 50px;
  opacity: 1;
}

/* BRILLOS CARTA */
.brillo-carta {
  position: absolute;
  animation: brillo 1.5s infinite;
}
</style>
</head>

<body>

<!-- 1 -->
<div class="pantalla" id="p1">
  <div class="contenido" id="brillos-container">
    <img src="https://i.imgur.com/2AQnTbl.jpeg">
    <h2>¿Me amas?</h2>

    <div class="botones">
      <button onclick="p2()">Sí</button>
      <button id="no" onmouseover="mover(event)">No</button>
    </div>
  </div>
</div>

<!-- 2 -->
<div class="pantalla oculto" id="p2">
  <div class="contenido">
    <img src="https://i.imgur.com/k6pzLlN.jpeg">
    <h2>¿de veldad?</h2>

    <div class="botones">
      <button onclick="p3()">Sí</button>
      <button id="no" onmouseover="mover(event)">No</button>
    </div>
  </div>
</div>

<!-- 3 -->
<div class="pantalla oculto" id="p3">
  <div class="contenido" id="corazones">
    <img src="https://i.imgur.com/MCLbeW7.jpeg">
    <h2>yo también te amo, mi amorr!</h2>
    <button onclick="p4()">Salir</button>
  </div>
</div>

<!-- 4 -->
<div class="pantalla oculto" id="p4">
  <div class="contenido">
    <h2>⛔</h2>
    <p>Espera todavía no te vayas...</p>
    <button onclick="p5()">ok</button>
  </div>
</div>

<!-- 5 -->
<div class="pantalla oculto" id="p5">
  <div class="contenido">
    <img src="https://i.imgur.com/quWVyxf.jpeg">
    <h2>Tenes un correo</h2>
    <button onclick="p7()">A ver</button>
  </div>
</div>

<!-- FINAL -->
<div class="pantalla oculto" id="p7">
  <div class="contenido">

    <div class="sobre" id="sobre">
      <img src="https://i.imgur.com/iLFFBoJ.jpeg" class="sobre-img">

      <div class="papel" id="carta">
        <img src="https://i.imgur.com/Y7tEZs5.jpeg">
      </div>
    </div>

  </div>
</div>

<script>
function mover(e){
  let btn = e.target;
  let cont = btn.parentElement;

  let x = Math.random()*(cont.offsetWidth-120);
  let y = Math.random()*(cont.offsetHeight-50);

  btn.style.left = x+"px";
  btn.style.top = y+"px";
}

function cambiar(a,b){
  document.getElementById(a).classList.add("oculto");
  document.getElementById(b).classList.remove("oculto");
}

function p2(){cambiar("p1","p2")}
function p3(){cambiar("p2","p3"); corazones();}
function p4(){cambiar("p3","p4")}
function p5(){cambiar("p4","p5")}

function p7(){
  cambiar("p5","p7");
  setTimeout(()=>abrir(),300);
}

function abrir(){
  document.getElementById("sobre").classList.add("abrir");
  brillosCarta();
}

function corazones(){
  let cont = document.getElementById("corazones");

  setInterval(()=>{
    let c = document.createElement("div");
    c.className="corazon";
    c.innerHTML="❤️";

    c.style.top=Math.random()*100+"%";
    c.style.left=Math.random()*100+"%";

    cont.appendChild(c);

    setTimeout(()=>c.remove(),3000);
  },400);
}

function brillosCarta(){
  let carta = document.getElementById("carta");

  setInterval(()=>{
    let b = document.createElement("div");
    b.className="brillo-carta";
    b.innerHTML="✦";

    b.style.top=Math.random()*100+"%";
    b.style.left=Math.random()*100+"%";

    carta.appendChild(b);

    setTimeout(()=>b.remove(),2000);
  },300);
}

function brillosInicio(){
  const cont = document.getElementById("brillos-container");

  setInterval(()=>{
    let b = document.createElement("div");
    b.className = "brillo";
    b.innerHTML = "✦";

    b.style.top = Math.random()*100 + "%";
    b.style.left = Math.random()*100 + "%";

    cont.appendChild(b);

    setTimeout(()=>b.remove(),2000);
  },150);
}

window.onload = brillosInicio;
</script>

</body>
</html>
