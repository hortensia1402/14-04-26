<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felices 2 meses ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: black;
  color: white;
}

.pantalla {
  position: fixed;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.contenido {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 95%;
  max-width: 500px;
}

.oculto {
  opacity: 0;
  pointer-events: none;
}

img {
  width: 95%;
  max-width: 350px;
  margin-bottom: 15px;
}

/* BOTONES */
.botones {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 140px;
}

button {
  width: 120px;
  padding: 12px;
  border: none;
  background: #ff6b81;
  color: white;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

/* BOTON NO */
#no {
  position: fixed;
}

/* ✨ EFECTO BOTÓN SÍ */
@keyframes brilloClick {
  0% { transform: scale(1); box-shadow: 0 0 0px gold; }
  50% { transform: scale(1.2); box-shadow: 0 0 20px gold, 0 0 30px yellow; }
  100% { transform: scale(1); box-shadow: 0 0 0px gold; }
}

.brillar {
  animation: brilloClick 0.4s ease;
}

/* ✨ BRILLOS */
@keyframes brillo {
  0% { opacity: 0; transform: scale(0.3); }
  50% { opacity: 1; transform: scale(1.5); }
  100% { opacity: 0; transform: scale(0.3); }
}

.brillo {
  position: fixed;
  animation: brillo 2s infinite;
  pointer-events: none;
  color: gold;
  font-size: 20px;
  text-shadow: 0 0 8px gold, 0 0 12px yellow;
}

/* 💖 CORAZONES */
@keyframes latir {
  0% {transform:scale(1);}
  50% {transform:scale(1.4);}
  100% {transform:scale(1);}
}

.corazon {
  position: fixed;
  font-size: 24px;
  animation: latir 1.5s infinite;
  pointer-events: none;
}

/* SOBRE */
.sobre {
  position: relative;
  width: 90%;
  max-width: 320px;
}

.sobre-img {
  width: 100%;
}

.papel {
  position: absolute;
  width: 85%;
  left: 7.5%;
  bottom: -160px;
  opacity: 0;
  transition: all 1s;
}

.papel img {
  width: 100%;
  border-radius: 10px;
}

.abrir .sobre-img {
  opacity: 0;
}

.abrir .papel {
  bottom: 60px;
  opacity: 1;
}
</style>
</head>

<body>

<!-- 1 -->
<div class="pantalla" id="p1">
  <div class="contenido">
    <img src="https://i.imgur.com/2AQnTbl.jpeg">
    <h2>¿Me amas?</h2>

    <div class="botones">
      <button onclick="efectoSi(this); p2()">Sí</button>
      <button id="no">No</button>
    </div>
  </div>
</div>

<!-- 2 -->
<div class="pantalla oculto" id="p2">
  <div class="contenido">
    <img src="https://i.imgur.com/k6pzLlN.jpeg">
    <h2>¿de veldad?</h2>

    <div class="botones">
      <button onclick="efectoSi(this); p3()">Sí</button>
      <button id="no">No</button>
    </div>
  </div>
</div>

<!-- 3 -->
<div class="pantalla oculto" id="p3">
  <div class="contenido">
    <img src="https://i.imgur.com/MCLbeW7.jpeg">
    <h2>yo también te amo, mi amorr!</h2>
    <button onclick="p4()">Salir</button>
  </div>
</div>

<!-- 4 -->
<div class="pantalla oculto" id="p4">
  <div class="contenido">
    <h2>⛔Espera todavía no te vayas ⛔</h2>
    
    <button onclick="p5()">ok</button>
  </div>
</div>

<!-- 5 -->
<div class="pantalla oculto" id="p5">
  <div class="contenido">
    <img src="https://i.imgur.com/quWVyxf.jpeg">
    <h2>Tenes un correo</h2>
    <button onclick="p7()">A ver</button>
  </div>
</div>

<!-- FINAL -->
<div class="pantalla oculto" id="p7">
  <div class="contenido">
    <div class="sobre" id="sobre">
      <img src="https://i.imgur.com/iLFFBoJ.jpeg" class="sobre-img">
      <div class="papel" id="carta">
        <img src="https://i.imgur.com/Y7tEZs5.jpeg">
      </div>
    </div>
  </div>
</div>

<script>
let animacion;

/* EFECTO BOTON SI */
function efectoSi(btn){
  btn.classList.add("brillar");
  setTimeout(()=>btn.classList.remove("brillar"),400);
}

/* CAMBIAR */
function cambiar(a,b){
  document.getElementById(a).classList.add("oculto");
  document.getElementById(b).classList.remove("oculto");
  detenerAnimaciones();
}

function p2(){cambiar("p1","p2")}
function p3(){cambiar("p2","p3"); corazones();}
function p4(){cambiar("p3","p4")}
function p5(){cambiar("p4","p5")}
function p7(){
  cambiar("p5","p7");
  setTimeout(()=>abrir(),300);
}

function abrir(){
  document.getElementById("sobre").classList.add("abrir");
}

function detenerAnimaciones(){
  clearInterval(animacion);
}

/* ✨ BRILLOS */
function brillos(){
  animacion = setInterval(()=>{
    let b = document.createElement("div");
    b.className="brillo";
    b.textContent="✦";

    b.style.top=Math.random()*100+"vh";
    b.style.left=Math.random()*100+"vw";

    document.body.appendChild(b);
    setTimeout(()=>b.remove(),2000);
  },150);
}

/* 💖 CORAZONES */
function corazones(){
  animacion = setInterval(()=>{
    let c = document.createElement("div");
    c.className="corazon";
    c.textContent="❤";

    c.style.top=Math.random()*100+"vh";
    c.style.left=Math.random()*100+"vw";

    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  },400);
}

/* 😈 BOTON NO ESCAPA */
function escapar(btn){
  let x = Math.random() * (window.innerWidth - btn.offsetWidth);
  let y = Math.random() * (window.innerHeight - btn.offsetHeight);

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

document.addEventListener("mousemove", (e)=>{
  let btn = document.getElementById("no");
  if(!btn) return;

  let rect = btn.getBoundingClientRect();
  let dist = Math.hypot(
    e.clientX - (rect.left + rect.width/2),
    e.clientY - (rect.top + rect.height/2)
  );

  if(dist < 100){
    escapar(btn);
  }
});

document.addEventListener("touchmove", (e)=>{
  let btn = document.getElementById("no");
  if(!btn) return;

  let touch = e.touches[0];
  let rect = btn.getBoundingClientRect();

  let dist = Math.hypot(
    touch.clientX - (rect.left + rect.width/2),
    touch.clientY - (rect.top + rect.height/2)
  );

  if(dist < 100){
    escapar(btn);
  }
});

/* iniciar */
window.onload = brillos;
</script>

</body>
</html>
