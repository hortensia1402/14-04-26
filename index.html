<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 meses ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: black;
  color: white;
}

.pantalla {
  position: fixed;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.contenido {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 95%;
  max-width: 500px;
}

.oculto {
  opacity: 0;
  pointer-events: none;
}

img {
  width: 95%;
  max-width: 350px;
  margin-bottom: 15px;
}

/* BOTONES */
.botones {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

button {
  width: 120px;
  padding: 12px;
  border: none;
  background: #ff6b81;
  color: white;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

/* ✨ BRILLOS */
@keyframes brillo {
  0% { opacity: 0; transform: scale(0.3); }
  50% { opacity: 1; transform: scale(1.5); }
  100% { opacity: 0; transform: scale(0.3); }
}

.brillo {
  position: fixed;
  animation: brillo 2s infinite;
  color: gold;
  font-size: 20px;
  pointer-events: none;
}

/* 💖 CORAZONES */
@keyframes latir {
  0% {transform:scale(1);}
  50% {transform:scale(1.4);}
  100% {transform:scale(1);}
}

.corazon {
  position: fixed;
  font-size: 24px;
  animation: latir 1.5s infinite;
  pointer-events: none;
}

/* SOBRE */
.sobre {
  position: relative;
  width: 90%;
  max-width: 320px;
}

.sobre-img {
  width: 100%;
}

.papel {
  position: absolute;
  width: 85%;
  left: 7.5%;
  bottom: -160px;
  opacity: 0;
  transition: all 1s;
}

.papel img {
  width: 100%;
  border-radius: 10px;
}

.abrir .sobre-img {
  opacity: 0;
}

.abrir .papel {
  bottom: 60px;
  opacity: 1;
}
</style>
</head>

<body>

<!-- 1 -->
<div class="pantalla" id="p1">
  <div class="contenido">
    <img src="https://i.imgur.com/2AQnTbl.jpeg">
    <h2>¿Me amas?</h2>
    <div class="botones">
      <button onclick="p2()">Sí</button>
      <button>No</button>
    </div>
  </div>
</div>

<!-- 2 -->
<div class="pantalla oculto" id="p2">
  <div class="contenido">
    <img src="https://i.imgur.com/k6pzLlN.jpeg">
    <h2>¿de veldad?</h2>
    <div class="botones">
      <button onclick="p3()">Sí</button>
      <button>No</button>
    </div>
  </div>
</div>

<!-- 3 -->
<div class="pantalla oculto" id="p3">
  <div class="contenido">
    <img src="https://i.imgur.com/MCLbeW7.jpeg">
    <h2>yo también te amo, mi amorr!</h2>
    <button onclick="p4()">Salir</button>
  </div>
</div>

<!-- 4 -->
<div class="pantalla oculto" id="p4">
  <div class="contenido">
    <h2>⛔ Espera</h2>
    <p>todavía no te vayas...</p>
    <button onclick="p5()">ok</button>
  </div>
</div>

<!-- 5 -->
<div class="pantalla oculto" id="p5">
  <div class="contenido">
    <img src="https://i.imgur.com/quWVyxf.jpeg">
    <h2>Tenes un correo</h2>
    <button onclick="p6()">Recibir</button>
  </div>
</div>

<!-- 6 -->
<div class="pantalla oculto" id="p6">
  <div class="contenido">
    <img src="https://i.imgur.com/iLFFBoJ.jpeg">
    <h2>toca para abrir</h2>
    <button onclick="p7()">A ver</button>
  </div>
</div>

<!-- 7 -->
<div class="pantalla oculto" id="p7">
  <div class="contenido">
    <div class="sobre" onclick="abrir()" id="sobre">
      <img src="https://i.imgur.com/iLFFBoJ.jpeg" class="sobre-img">
      <div class="papel">
        <img src="https://i.imgur.com/Y7tEZs5.jpeg">
      </div>
    </div>
  </div>
</div>

<script>
let animacion;

/* cambiar pantallas */
function cambiar(a,b){
  document.getElementById(a).classList.add("oculto");
  document.getElementById(b).classList.remove("oculto");
  clearInterval(animacion);
}

function p2(){cambiar("p1","p2")}
function p3(){cambiar("p2","p3"); corazones();}
function p4(){cambiar("p3","p4")}
function p5(){cambiar("p4","p5")}
function p6(){cambiar("p5","p6")}
function p7(){cambiar("p6","p7")}

/* abrir carta */
function abrir(){
  document.getElementById("sobre").classList.add("abrir");
}

/* ✨ brillos SOLO pantalla 1 */
function brillos(){
  animacion = setInterval(()=>{
    let b = document.createElement("div");
    b.className="brillo";
    b.textContent="✦";
    b.style.top=Math.random()*100+"vh";
    b.style.left=Math.random()*100+"vw";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),2000);
  },150);
}

/* 💖 corazones SOLO pantalla 3 */
function corazones(){
  animacion = setInterval(()=>{
    let c = document.createElement("div");
    c.className="corazon";
    c.textContent="❤";
    c.style.top=Math.random()*100+"vh";
    c.style.left=Math.random()*100+"vw";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  },400);
}

/* iniciar */
window.onload = brillos;
</script>

</body>
</html>
